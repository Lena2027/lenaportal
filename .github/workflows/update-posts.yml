name: Auto-update posts.json

on:
  push:
    branches: [main]
    paths:
      - 'germany/*.html'
      - '!germany/index.html'

jobs:
  update-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate posts.json
        run: python3 scripts/scan_posts.py

      - name: Commit posts.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --staged --quiet && echo "No changes to posts.json" || (
            git commit -m "auto: update posts.json [skip ci]" &&
            git push
          )
